spring.application.name=DCMonitor Platform

spring.datasource.url=jdbc:mysql://localhost:3306/equinix?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.equinix.platform.u202319440.shared.infrastructure.persistence.jpa.strategy.SnakeCasePhysicalNamingStrategy

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

springdoc.swagger-ui.path=/swagger-ui.html
